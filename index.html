<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple interactive quiz application built with vanilla JavaScript.">
    <title>Internship Week 3 Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Week 3 Quiz Task</h1>
    </header>

    <main id="quiz-container">
        <section id="start-screen" class="screen active">
            <h2>Welcome to the Quiz</h2>
            <p>You have 60 seconds to answer 10 questions.</p>
            <button onclick="startQuiz()" class="btn">Start Quiz</button>
        </section>

        <section id="quiz-screen" class="screen hidden">
            <div id="timer-display">Time: <span id="time">60</span>s</div>
            <div id="question-container">
                <h3 id="question-text">Question goes here...</h3>
                <div id="options-container">
                </div>
            </div>
            <p id="feedback-msg" class="hidden"></p>
            <button id="next-btn" onclick="nextQuestion()" class="btn hidden">Next Question</button>
        </section>

        <section id="result-screen" class="screen hidden">
            <h2>Quiz Completed!</h2>
            <p>Your Score: <span id="final-score">0</span> / 10</p>
            <div id="review-container">
                </div>
            <button onclick="restartQuiz()" class="btn">Try Again</button>
        </section>
    </main>

    <footer class="footer">
        <p>JavaScript Quiz Application</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
